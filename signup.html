<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup - School Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .container-box {
            width: 900px;
            max-width: 95%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
        }

        .left-panel {
            width: 50%;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .left-panel h1 {
            font-size: 42px;
            margin-bottom: 16px;
        }

        .left-panel p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .social-icons {
            margin-top: 24px;
        }

        .social-icons i {
            font-size: 22px;
            margin: 0 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .social-icons i:hover {
            color: #fff;
            transform: translateY(-4px);
        }

        .right-panel {
            width: 50%;
            padding: 48px 40px;
            position: relative;
        }

        .form-box h2 {
            font-weight: 700;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .input-group-text {
            background: #feb47b;
            color: white;
            border: none;
            min-width: 55px;
            justify-content: center;
        }

        .form-control {
            border: none;
            padding: 16px 14px;
            height: auto;
        }

        .form-control:focus {
            box-shadow: none;
            outline: none;
        }

        .btn-custom {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 18px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(254, 180, 123, 0.25);
        }

        .toggle-text {
            text-align: center;
            margin-top: 24px;
            font-size: 15px;
        }

        .toggle-text a {
            color: #ff7e5f;
            text-decoration: none;
            font-weight: 600;
        }

        .alert-message {
            display: none;
            margin-top: 18px;
        }

        @media (max-width: 780px) {
            .container-box {
                flex-direction: column;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .right-panel {
                padding: 28px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="container-box">
        <div class="left-panel">
            <h1>Join Us!</h1>
            <p>Create an account to start managing your school data more efficiently and securely.</p>

            <div class="social-icons">
                <i class="bi bi-google"></i>
                <i class="bi bi-github"></i>
                <i class="bi bi-slack"></i>
                <i class="bi bi-dribbble"></i>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-box">
                <h2 class="text-center">Signup</h2>
                <form id="signupForm">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" id="signupName" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                        <input type="email" id="signupEmail" class="form-control" placeholder="Email address" required>
                    </div>

                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="signupPassword" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm Password"
                            required>
                    </div>

                    <button type="submit" class="btn btn-custom">Create Account</button>
                </form>

                <div class="alert alert-success alert-message" id="signupAlert" role="alert"></div>

                <div class="toggle-text">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirm = document.getElementById('signupConfirm').value.trim();
            const alertBox = document.getElementById('signupAlert');

            if (!name || !email || !password || !confirm) {
                alert('Please complete all fields.');
                return;
            }

            if (password !== confirm) {
                alert('Passwords do not match.');
                return;
            }

            alertBox.textContent = 'Signup successful! Redirecting to login page...';
            alertBox.style.display = 'block';

            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1200);
        });
    </script>
</body>

</html>
